services:
  openwb-dashboard:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: openwb-dashboard
    ports:
      - "3000:3000"
    environment:
      - MQTT_BROKER=mqtt://10.100.95.10:1883
      - PORT=3000
    volumes:
      # Mount the frontend as a read-only volume so changes are immediate
      - ./frontend:/app/frontend:ro
      # Persistent data (RFID users, notification config)
      - ./data:/app/data
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/state"]
      interval: 30s
      timeout: 5s
      retries: 3
